server:
  listen: ":8080"
  max_request_body_size: 10485760
  shutdown_timeout: 30s

log:
  level: "info"
  output: "stdout"

telemetry:
  enabled: true
  service_name: "gateway"
  exporter:
    type: "otlp"
    protocol: "grpc"
    endpoint: "localhost:4317"
  sampler:
    type: "ratio"
    ratio: 0.1

metrics:
  enabled: true
  path: "/metrics"

health:
  path: "/health"
  check:
    - name: "discovery"

cors:
  allowed_origins: ["*"]
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
  allowed_headers: ["Authorization", "Content-Type"]
  max_age: 3600

ip_filter:
  mode: "blacklist"
  list: []

rate_limit:
  storage: "local"
  algorithm: "sliding_window"

request_sign:
  enabled: false
  algorithm: "hmac-sha256"
  sign_header: "X-Signature"
  timestamp_header: "X-Timestamp"
  expire: 300

auth_schemes:
  app_user:
    type: "jwt"
    jwt:
      secret: "your-secret-key"
      algorithms: ["HS256"]
      header: "Authorization"
      claims_to_headers:
        user_id: "X-User-Id"

discovery:
  type: "static"
  static:
    services:
      user-service:
        - host: "127.0.0.1"
          port: 8081
          weight: 1

routes:
  - name: "user-service"
    prefix: "/api/v1/users"
    service: "user-service"
    timeout: 5s
    load_balancer: "round_robin"
    middleware:
      auth:
        scheme: "app_user"
